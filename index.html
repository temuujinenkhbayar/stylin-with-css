<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Stylin' with CSS by Temuujin Enkhbayar</title>
        <link rel="stylesheet" href="css/main.css">
    </head>
    <body>
        <header>
          <h1>Stylin' with CSS By Temuujin Enkhbayar</h1>
        </header>
        <footer>
            <a id="html-validate" href="#" target="_blank">Check HTML</a> | 
            <a id="css-validate" href="#" target="_blank">Check CSS</a>
        </footer>
        <script>
            // HTML/CSS Checker
            document.addEventListener("DOMContentLoaded", function() {
                var currentUrl = window.location.href;
                document.getElementById("html-validate").href = "https://validator.w3.org/nu/?doc=" + encodeURIComponent(currentUrl);
                document.getElementById("css-validate").href = "https://jigsaw.w3.org/css-validator/validator?uri=" + encodeURIComponent(currentUrl);
            });
        </script>
    </body>
</html>
